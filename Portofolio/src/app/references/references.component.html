<div class="reference-section">
  <div><h2>Need a teamplayer? Here what my colleagues said about me</h2></div>
  <div id="boxreference">
    @for (item of reference; track $index) {
    <div class="templatebox">
      <h2>{{ item.title }}</h2>
      <div>
        <p>Projekt</p>
        <a href="#">{{ item.projekt }}</a>
      </div>
      <span>{{ item.description }}</span>
      <a href="#">Linked In Profile</a>
    </div>
    }
  </div>
</div>
