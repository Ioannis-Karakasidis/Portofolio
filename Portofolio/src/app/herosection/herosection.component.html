<div class="profile-card" id="profile">
  <div class="d-none">
    <app-headerlogo [path]="path"></app-headerlogo
    ><button (click)="toggleImage()">
      <img src="assets/img/menu.png" alt="" />
    </button>
  </div>
  <div>
    <img *ngIf="showImage" src="assets/img/Bild1.png" alt="" />
    <div *ngIf="!showImage" class="boxlinkss">
      <a class="boxlinks" href="#why-me">{{
        Isgerman ? "Warum ich" : "Why me"
      }}</a>
      <a class="boxlinks" href="#Skills">{{
        Isgerman ? "Fähigkeiten" : "Skills"
      }}</a>
      <a class="boxlinks" href="#Projects">{{
        Isgerman ? "Projekte" : "Projects"
      }}</a>
      <a class="boxlinks" href="#Contact">{{
        Isgerman ? "Kontakt" : "Contact"
      }}</a>
    </div>
  </div>

  <div>
    <div>
      <div>
        <app-headerlogo class="logo" [path]="path"></app-headerlogo>
        <span>Ioannis Karakasidis</span>
        @if(Isgerman) {
        <span>Frontend Entwickler </span>
        }@else {
        <span>FRONTEND DEVELOPER </span>
        }
      </div>
      <a href="#"><img src="assets/img/Arrow Up.png" alt="" /></a>
    </div>
    <app-contacticons
      [customClass]="'custom-flex'"
      [path]="path"
    ></app-contacticons>
  </div>
</div>
